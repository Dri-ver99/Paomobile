<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สแกนเพื่อชำระเงิน - Paomobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --co-orange: #ee4d2d;
            --co-bg: #f5f5f5;
            --co-border: #e8e8e8;
            --co-text: #222;
            --co-muted: #757575;
            --co-card: #fff;
        }
        body {
            background: var(--co-bg);
            font-family: 'Outfit', 'Noto Sans Thai', sans-serif;
            color: var(--co-text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .qr-container {
            background: var(--co-card);
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 420px;
            padding: 32px;
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--co-muted);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 24px;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            font-family: inherit;
        }
        .back-btn:hover {
            color: var(--co-orange);
        }
        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--co-text);
            margin-bottom: 8px;
        }
        .total-amount {
            font-size: 2rem;
            font-weight: 700;
            color: var(--co-orange);
            margin-bottom: 24px;
        }
        .qr-wrapper {
            margin: 0 auto 24px;
            background: #fff;
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: inline-block;
        }
        .qr-image {
            width: 260px;
            height: 260px;
            object-fit: contain;
            display: block;
        }
        .bank-info {
            background: #fafafa;
            border: 1px solid var(--co-border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .bank-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .bank-info-row:last-child {
            margin-bottom: 0;
        }
        .info-label {
            color: var(--co-muted);
        }
        .info-value {
            font-weight: 500;
            color: var(--co-text);
        }
        .info-value-bank {
            color: #16a34a;
            font-weight: 600;
        }
        .btn-line-submit {
            background: #00B900;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.15s;
        }
        .btn-line-submit:hover {
            background: #009900;
        }
        .instruction-note {
            font-size: 0.85rem;
            color: var(--co-muted);
            margin-top: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="qr-container">
        <button class="back-btn" onclick="history.back()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            ย้อนกลับ
        </button>

        <div class="header-title">สแกน QR Code เพื่อชำระเงิน</div>
        <div class="total-amount" id="displayAmount">฿0</div>

        <div class="qr-wrapper">
            <img src="payment-qr.png" alt="QR Code พร้อมเพย์" class="qr-image" onerror="this.outerHTML='<div style=\'width:260px;height:260px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;color:#999;font-size:0.9rem;text-align:center;\'>[ รูป QR Code ]<br>ไม่มีไฟล์ payment-qr.png</div>'">
        </div>

        <div class="bank-info">
            <div class="bank-info-row">
                <span class="info-label">ธนาคาร:</span>
                <span class="info-value-bank">พร้อมเพย์ (KBank)</span>
            </div>
            <div class="bank-info-row">
                <span class="info-label">เลขบัญชี (เบอร์):</span>
                <span class="info-value">092-3-99772-5</span>
            </div>
            <div class="bank-info-row">
                <span class="info-label">ชื่อบัญชี:</span>
                <span class="info-value">น.ส. สุภรณ์ อินนา</span>
            </div>
        </div>

        <button class="btn-line-submit" onclick="submitToLine()">
            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            แจ้งโอนเงินผ่าน LINE
        </button>

        <div class="instruction-note">
            หลังจากสแกนชำระเงินเรียบร้อยแล้ว<br>
            กรุณากดปุ่ม <b>"แจ้งโอนเงินผ่าน LINE"</b> เพื่อส่งรายละเอียดคำสั่งซื้อและแนบสลิปให้ทางร้าน
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const amount = localStorage.getItem('pao_pending_order_amount');
            if (amount && !isNaN(amount)) {
                document.getElementById('displayAmount').textContent = '฿' + parseInt(amount).toLocaleString();
            } else {
                document.getElementById('displayAmount').textContent = '฿ -';
            }
        });

        function submitToLine() {
            let msg = localStorage.getItem('pao_pending_order_msg');
            if (!msg) {
                msg = "สวัสดีครับ สนใจสั่งซื้อสินค้าที่ทำรายการไว้ แจ้งสลิปเพิ่มครับ";
            }
            // Add note to prompt for slip
            msg += "\n\n(โอนเงินเรียบร้อยแล้ว แนบสลิปด้านล่างได้เลยครับ 👇)";
            
            // Clear cart logic could be here, but let's wait until they actually send. 
            // Better not to clear immediately in case they back out.
            window.location.href = `https://line.me/R/ti/p/@pao789?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
