<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงชื่อเข้าใช้ - Paomobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans Thai', 'Outfit', sans-serif;
            background-color: #f7f7f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #111;
        }
        .login-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 460px;
            padding: 48px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: auto;
            margin: 0 auto 32px auto;
            border-radius: 8px;
            object-fit: contain;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: left;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 15px;
            color: #555;
            margin-bottom: 32px;
            text-align: left;
        }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: 1px solid #e5e7eb;
            background-color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background-color 0.2s;
            font-family: inherit;
        }
        .btn-google {
            color: #4b5563;
        }
        .btn-google:hover {
            background-color: #f9fafb;
        }
        .btn-facebook {
            color: #1877f2;
        }
        .btn-facebook:hover {
            background-color: #f0f8ff;
        }
        .social-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e5e5;
        }
        .divider:not(:empty)::before {
            margin-right: 16px;
        }
        .divider:not(:empty)::after {
            margin-left: 16px;
        }
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #0b5edd; /* Blue border as shown in mockup */
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input::placeholder {
            color: #888;
        }
        .input-group input:focus {
            border-color: #094eb8;
            box-shadow: 0 0 0 3px rgba(11, 94, 221, 0.1);
        }
        .btn-continue {
            display: block;
            width: 100%;
            background-color: #0b5edd; /* Blue */
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }
        .btn-continue:hover {
            background-color: #094eb8;
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #555;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #111;
        }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0b5edd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 500;
            color: #111;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            body {
                background-color: #ffffff;
            }
            .login-card {
                padding: 32px 24px;
                box-shadow: none;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">กำลังประมวลผล...</div>
</div>

<div class="login-card">
    <a href="index.html">
        <img src="logo.png" alt="Paomobile Logo" class="logo" onerror="this.onerror=null; this.src='https://placehold.co/80x80?text=Logo';">
    </a>
    <h1>ลงชื่อเข้าใช้</h1>
    <p class="subtitle">ลงชื่อเข้าใช้หรือสร้างบัญชีผู้ใช้</p>
    
    <div class="input-group">
        <input type="email" id="emailInput" placeholder="อีเมล">
    </div>
    <div class="input-group" style="display: none;" id="passwordGroup">
        <input type="password" id="passwordInput" placeholder="รหัสผ่าน">
    </div>
    
    <button class="btn-continue" id="btnEmailLogin">ดำเนินการต่อ</button>

    <div class="divider" style="margin-top: 32px;">หรือ</div>

    <button id="btnGoogleLogin" class="btn-social btn-google" style="border: 1px solid #e5e7eb; cursor: pointer;">
        <span class="social-icon">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" width="24" height="24">
        </span>
        เข้าสู่ระบบด้วยบัญชี Google
    </button>

    <a href="index.html" class="back-link">← กลับสู่หน้าหลัก</a>
</div>

<!-- Firebase SDK Implementation -->
<script type="module">
  import { auth, db } from "./firebase-config.js";
  import { signInWithRedirect, getRedirectResult, GoogleAuthProvider, fetchSignInMethodsForEmail, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

  const overlay = document.getElementById('loadingOverlay');
  const showLoading = () => overlay.style.display = 'flex';
  const hideLoading = () => overlay.style.display = 'none';

  // --- Proactive Detection ---
  if (auth) {
      // 1. Initial check for redirect payload (The standard way)
      checkRedirectResult();
      
      // 2. Observer (The robust catch-all)
      onAuthStateChanged(auth, async (user) => {
          if (user) {
              console.log("[Auth] User found via Observer. Checking local session...");
              const currentData = localStorage.getItem('paomobile_user');
              let needsUpdate = true;
              
              if (currentData) {
                  try {
                      const parsed = JSON.parse(currentData);
                      if (parsed.uid === user.uid) needsUpdate = false;
                  } catch(e) {}
              }

              // Even if session is "correct", let's force a finishLogin to move them along
              if (needsUpdate) {
                  console.log("[Auth] Local session missing or wrong. Saving...");
                  showLoading();
                  await saveUserToFirestore(user, 'observer_sync');
              }
              
              console.log("[Auth] Pushing user to homepage...");
              await finishLogin(user.displayName || user.email);
          } else {
              // Not logged in - clear any partial state to be safe for next attempt
              localStorage.removeItem('paomobile_user');
              localStorage.removeItem('pao_cart_owner');
              hideLoading();
          }
      });
  }

  // --- Handle Redirect Result (Standard Firebase Flow) ---
  async function checkRedirectResult() {
      if (!auth) return;
      try {
          const result = await getRedirectResult(auth);
          if (result && result.user) {
              console.log("[Auth] Redirect Success: Finalizing user data...");
              showLoading();
              await saveUserToFirestore(result.user, 'google_redirect');
              
              if (window.CartAPI && typeof window.CartAPI.forceSync === 'function') {
                  try {
                      await window.CartAPI.forceSync();
                  } catch (syncErr) { console.error("[Auth] Sync err:", syncErr); }
              }
              
              await finishLogin(result.user.displayName);
          }
      } catch (error) {
          console.error("[Auth] Redirect Error:", error);
          hideLoading();
          if (error.code !== 'auth/web-storage-unsupported') {
              alert("การเข้าระบบล้มเหลว: " + error.message);
          }
      }
  }

  // The "Go to Home" function (With safety delay for storage flush)
  async function finishLogin(name) {
      showLoading();
      console.log("[Auth] Navigation sequence started for:", name);
      // Wait long enough for both localStorage and Firestore's internal states to settle
      await wait(1000); 
      window.location.replace("index.html"); // .replace prevents "back to login" loops
  }

  // --- Save user data to Firestore ---
  async function saveUserToFirestore(user, provider) {
      console.log("[Auth] Saving user session...");
      const userData = {
          uid: user.uid,
          name: user.displayName || user.email.split('@')[0],
          email: user.email,
          photo: user.photoURL || ""
      };
      localStorage.setItem('paomobile_user', JSON.stringify(userData));

      if (!db) return;
      try {
          const userRef = doc(db, "users", user.uid);
          await setDoc(userRef, {
              ...userData,
              photoURL: userData.photo,
              provider: provider,
              lastLogin: new Date()
          }, { merge: true });
          console.log("[Auth] User data synced to cloud.");
      } catch (e) {
          console.error("[Auth] Error saving user data: ", e);
      }
  }

  // Helper for small delay
  const wait = (ms) => new Promise(res => setTimeout(res, ms));

  // --- Google Sign-in ---
  document.getElementById("btnGoogleLogin").addEventListener("click", () => {
    if(!auth){ alert("Firebase Auth not initialized"); return; }
    showLoading(); 
    const provider = new GoogleAuthProvider();
    signInWithRedirect(auth, provider).catch((error) => {
      console.error(error);
      hideLoading();
      alert("Error starting login: " + error.message);
    });
  });

  // --- Email Flow ---
  let isPasswordPhase = false;
  document.getElementById("btnEmailLogin").addEventListener("click", async () => {
     if(!auth){ alert("Firebase Auth not initialized"); return; }
     const email = document.getElementById("emailInput").value;
     if(!email) { alert("กรุณากรอกอีเมล"); return; }
     
     if(!isPasswordPhase) {
         fetchSignInMethodsForEmail(auth, email).then((methods) => {
             document.getElementById("passwordGroup").style.display = "block";
             document.getElementById("btnEmailLogin").innerText = methods.length > 0 ? "เข้าสู่ระบบ" : "สมัครสมาชิก";
             isPasswordPhase = true;
         }).catch(err => {
             alert(err.message);
         });
     } else {
         const password = document.getElementById("passwordInput").value;
         if(!password) { alert("กรุณากรอกรหัสผ่าน"); return; }
         
         try {
             showLoading();
             let cred;
             if(document.getElementById("btnEmailLogin").innerText === "เข้าสู่ระบบ") {
                 cred = await signInWithEmailAndPassword(auth, email, password);
             } else {
                 cred = await createUserWithEmailAndPassword(auth, email, password);
             }
             
             await saveUserToFirestore(cred.user, 'password');
             
             if (window.CartAPI && typeof window.CartAPI.forceSync === 'function') {
                 await window.CartAPI.forceSync();
             }
             
             await finishLogin(cred.user.displayName || cred.user.email);
             
         } catch(err) {
             console.error("[Auth] Login error:", err);
             hideLoading();
             alert(err.code === 'auth/wrong-password' ? "อีเมลหรือรหัสผ่านไม่ถูกต้อง" : "เกิดข้อผิดพลาด: " + err.message);
         }
     }
  });
</script>
<script src="cart.js"></script>
</body>
</html>
