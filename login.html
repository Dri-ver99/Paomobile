<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงชื่อเข้าใช้ - Paomobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans Thai', 'Outfit', sans-serif;
            background-color: #f7f7f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #111;
        }
        .login-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 460px;
            padding: 48px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: auto;
            margin: 0 auto 32px auto;
            border-radius: 8px;
            object-fit: contain;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: left;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 15px;
            color: #555;
            margin-bottom: 32px;
            text-align: left;
        }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: 1px solid #e5e7eb;
            background-color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background-color 0.2s;
            font-family: inherit;
        }
        .btn-google {
            color: #4b5563;
        }
        .btn-google:hover {
            background-color: #f9fafb;
        }
        .btn-facebook {
            color: #1877f2;
        }
        .btn-facebook:hover {
            background-color: #f0f8ff;
        }
        .social-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e5e5;
        }
        .divider:not(:empty)::before {
            margin-right: 16px;
        }
        .divider:not(:empty)::after {
            margin-left: 16px;
        }
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #0b5edd; /* Blue border as shown in mockup */
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input::placeholder {
            color: #888;
        }
        .input-group input:focus {
            border-color: #094eb8;
            box-shadow: 0 0 0 3px rgba(11, 94, 221, 0.1);
        }
        .btn-continue {
            display: block;
            width: 100%;
            background-color: #0b5edd; /* Blue */
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }
        .btn-continue:hover {
            background-color: #094eb8;
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #555;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #111;
        }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0b5edd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 500;
            color: #111;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            body {
                background-color: #ffffff;
            }
            .login-card {
                padding: 32px 24px;
                box-shadow: none;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">กำลังประมวลผล...</div>
</div>

<div class="login-card">
    <a href="index.html">
        <img src="logo.png" alt="Paomobile Logo" class="logo" onerror="this.onerror=null; this.src='https://placehold.co/80x80?text=Logo';">
    </a>
    <h1>ลงชื่อเข้าใช้</h1>
    <p class="subtitle">ลงชื่อเข้าใช้หรือสร้างบัญชีผู้ใช้</p>
    
    <div class="input-group">
        <input type="email" id="emailInput" placeholder="อีเมล">
    </div>
    <div class="input-group" style="display: none;" id="passwordGroup">
        <input type="password" id="passwordInput" placeholder="รหัสผ่าน">
    </div>
    
    <button class="btn-continue" id="btnEmailLogin">ดำเนินการต่อ</button>

    <div class="divider" style="margin-top: 32px;">หรือ</div>

    <button id="btnGoogleLogin" class="btn-social btn-google" style="border: 1px solid #e5e7eb; cursor: pointer;">
        <span class="social-icon">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" width="24" height="24">
        </span>
        เข้าสู่ระบบด้วยบัญชี Google
    </button>

    <div id="emergencyRedirect" style="display: none; margin-top: 15px; text-align: center;">
        <p style="font-size: 0.85em; color: #64748b; margin-bottom: 8px;">หากระบบไม่เปลี่ยนหน้าอัตโนมัติ:</p>
        <a href="index.html" class="btn-continue" style="background: #e2e8f0; color: #1e293b; padding: 10px 20px; font-size: 0.9em;">ไปหน้าหลักด้วยบัญชีนี้</a>
    </div>

    <a href="index.html" class="back-link">← กลับสู่หน้าหลัก</a>
</div>

<!-- Firebase SDK Implementation -->
<script type="module">
  import { auth, db } from "./firebase-config.js";
  import { signInWithRedirect, getRedirectResult, GoogleAuthProvider, fetchSignInMethodsForEmail, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

  // --- Resilience State ---
  let isNavigating = false;
  let isCheckingRedirect = true;

  const overlay = document.getElementById('loadingOverlay');
  const showLoading = () => overlay.style.display = 'flex';
  const hideLoading = () => {
      // Never hide loading if we are already transitioning to the home page
      if (isNavigating) return;
      overlay.style.display = 'none';
  };

  // --- Auth Initializer (Sequenced Flow) ---
  async function initAuth() {
      if (!auth) return;

      // 1. Handle actual logout request (Wait for it to finish)
      if (localStorage.getItem('pao_logout_pending')) {
          console.log("[Auth] Logout signal detected. Forcing signOut...");
          showLoading(); // Ensure spinner is up
          localStorage.removeItem('pao_logout_pending');
          await auth.signOut();
          console.log("[Auth] Cloud sign-out complete.");
          hideLoading();
      }

      // 2. Check for Google Redirect Result
      await checkRedirectResult();
      
      // 3. Release redirect lock (Observer can now handle UI)
      isCheckingRedirect = false;
      console.log("[Auth] Redirect check finished. Observer active.");
  }

  // --- Start the flow ---
  initAuth();

  // --- Observer (The persistent sentry) ---
  onAuthStateChanged(auth, async (user) => {
      // If we are currently logging out or already moving to home, ignore observer
      if (localStorage.getItem('pao_logout_pending') || isNavigating) return;

      if (user) {
          console.log("[Auth] User detected. Checking session status...");
          const currentData = localStorage.getItem('paomobile_user');
          let needsSync = true;
          
          if (currentData) {
              try {
                  const parsed = JSON.parse(currentData);
                  if (parsed.uid === user.uid) needsSync = false;
              } catch(e) {}
          }

          if (needsSync) {
              console.log("[Auth] New or mismatched session. Syncing...");
              showLoading();
              await saveUserToFirestore(user, 'observer_sync');
          }
          
          await finishLogin(user.displayName || user.email);
      } else {
          // No user found AND we are done checking for Google redirects
          if (!isCheckingRedirect) {
              console.log("[Auth] No session found. Cleaning up.");
              localStorage.removeItem('paomobile_user');
              localStorage.removeItem('pao_cart_owner');
              hideLoading();
          }
      }
  });

  // --- Handle Redirect Result (The Google Path) ---
  async function checkRedirectResult() {
      try {
          const result = await getRedirectResult(auth);
          if (result && result.user) {
              console.log("[Auth] Google Redirect Success!");
              isNavigating = true; // LOCK NAVIGATION
              showLoading();
              saveUserToFirestore(result.user, 'google_redirect'); // Non-blocking
              
              if (window.CartAPI && typeof window.CartAPI.forceSync === 'function') {
                  try { await window.CartAPI.forceSync(); } catch(e) {}
              }
              
              await finishLogin(result.user.displayName);
          }
      } catch (error) {
          console.error("[Auth] Redirect Error:", error);
          if (error.code !== 'auth/web-storage-unsupported') {
              alert("การเข้าระบบล้มเหลว: " + error.message);
          }
      }
  }

  // Final Redirection Sequence (With Lock)
  async function finishLogin(name) {
      if (isNavigating && overlay.style.display !== 'flex') return; // Prevent double trigger
      
      isNavigating = true; // ACTIVATE LOCK
      showLoading();
      
      // If it takes more than 4 seconds, show the emergency button
      setTimeout(() => {
          const emergency = document.getElementById('emergencyRedirect');
          if (emergency) emergency.style.display = 'block';
      }, 4000);

      console.log("[Auth] Fast Redirect Initialized for:", name);
      // Minimal delay for storage safety
      await wait(600); 
      window.location.replace("index.html");
  }

  // --- Save user data to Firestore (Optimistic & Non-blocking) ---
  async function saveUserToFirestore(user, provider) {
      console.log("[Auth] Saving local session...");
      const userData = {
          uid: user.uid,
          name: user.displayName || user.email.split('@')[0],
          email: user.email,
          photo: user.photoURL || ""
      };
      
      // 1. SAVE LOCALLY FIRST (Immediate)
      localStorage.setItem('paomobile_user', JSON.stringify(userData));
      
      // 2. BACKGROUND CLOUD SYNC (Don't 'await' the result)
      if (db) {
          console.log("[Auth] Triggering background cloud sync...");
          const userRef = doc(db, "users", user.uid);
          setDoc(userRef, {
              ...userData,
              photoURL: userData.photo,
              provider: provider,
              lastLogin: new Date()
          }, { merge: true }).then(() => {
              console.log("[Auth] Cloud sync completed in background.");
          }).catch(e => {
              console.warn("[Auth] Background cloud sync failed:", e);
          });
      }
      
      // 3. Resolve immediately
      return Promise.resolve();
  }

  // Helper for small delay
  const wait = (ms) => new Promise(res => setTimeout(res, ms));

  // --- Google Sign-in ---
  document.getElementById("btnGoogleLogin").addEventListener("click", () => {
    if(!auth){ alert("Firebase Auth not initialized"); return; }
    showLoading(); 
    const provider = new GoogleAuthProvider();
    signInWithRedirect(auth, provider).catch((error) => {
      console.error(error);
      hideLoading();
      alert("Error starting login: " + error.message);
    });
  });

  // --- Email Flow ---
  let isPasswordPhase = false;
  document.getElementById("btnEmailLogin").addEventListener("click", async () => {
     if(!auth){ alert("Firebase Auth not initialized"); return; }
     const email = document.getElementById("emailInput").value;
     if(!email) { alert("กรุณากรอกอีเมล"); return; }
     
     if(!isPasswordPhase) {
         fetchSignInMethodsForEmail(auth, email).then((methods) => {
             document.getElementById("passwordGroup").style.display = "block";
             document.getElementById("btnEmailLogin").innerText = methods.length > 0 ? "เข้าสู่ระบบ" : "สมัครสมาชิก";
             isPasswordPhase = true;
         }).catch(err => {
             alert(err.message);
         });
     } else {
         const password = document.getElementById("passwordInput").value;
         if(!password) { alert("กรุณากรอกรหัสผ่าน"); return; }
         
         try {
             showLoading();
             let cred;
             if(document.getElementById("btnEmailLogin").innerText === "เข้าสู่ระบบ") {
                 cred = await signInWithEmailAndPassword(auth, email, password);
             } else {
                 cred = await createUserWithEmailAndPassword(auth, email, password);
             }
             
             await saveUserToFirestore(cred.user, 'password');
             
             if (window.CartAPI && typeof window.CartAPI.forceSync === 'function') {
                 await window.CartAPI.forceSync();
             }
             
             await finishLogin(cred.user.displayName || cred.user.email);
             
         } catch(err) {
             console.error("[Auth] Login error:", err);
             hideLoading();
             alert(err.code === 'auth/wrong-password' ? "อีเมลหรือรหัสผ่านไม่ถูกต้อง" : "เกิดข้อผิดพลาด: " + err.message);
         }
     }
  });
</script>
<script src="cart.js"></script>
</body>
</html>
