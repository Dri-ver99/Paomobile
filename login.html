<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงชื่อเข้าใช้ - Paomobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans Thai', 'Outfit', sans-serif;
            background-color: #f7f7f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #111;
        }
        .login-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 460px;
            padding: 48px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: auto;
            margin: 0 auto 32px auto;
            border-radius: 8px;
            object-fit: contain;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: left;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 15px;
            color: #555;
            margin-bottom: 32px;
            text-align: left;
        }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: 1px solid #e5e7eb;
            background-color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background-color 0.2s;
            font-family: inherit;
        }
        .btn-google {
            color: #4b5563;
        }
        .btn-google:hover {
            background-color: #f9fafb;
        }
        .btn-facebook {
            color: #1877f2;
        }
        .btn-facebook:hover {
            background-color: #f0f8ff;
        }
        .social-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e5e5;
        }
        .divider:not(:empty)::before {
            margin-right: 16px;
        }
        .divider:not(:empty)::after {
            margin-left: 16px;
        }
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #0b5edd; /* Blue border as shown in mockup */
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input::placeholder {
            color: #888;
        }
        .input-group input:focus {
            border-color: #094eb8;
            box-shadow: 0 0 0 3px rgba(11, 94, 221, 0.1);
        }
        .btn-continue {
            display: block;
            width: 100%;
            background-color: #0b5edd; /* Blue */
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }
        .btn-continue:hover {
            background-color: #094eb8;
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #555;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #111;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            body {
                background-color: #ffffff;
            }
            .login-card {
                padding: 32px 24px;
                box-shadow: none;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <a href="index.html">
        <img src="logo.png" alt="Paomobile Logo" class="logo" onerror="this.onerror=null; this.src='https://placehold.co/80x80?text=Logo';">
    </a>
    <h1>ลงชื่อเข้าใช้</h1>
    <p class="subtitle">ลงชื่อเข้าใช้หรือสร้างบัญชีผู้ใช้</p>
    
    <div class="input-group">
        <input type="email" id="emailInput" placeholder="อีเมล">
    </div>
    <div class="input-group" style="display: none;" id="passwordGroup">
        <input type="password" id="passwordInput" placeholder="รหัสผ่าน">
    </div>
    
    <button class="btn-continue" id="btnEmailLogin">ดำเนินการต่อ</button>

    <div class="divider" style="margin-top: 32px;">หรือ</div>

    <button id="btnGoogleLogin" class="btn-social btn-google" style="border: 1px solid #e5e7eb; cursor: pointer;">
        <span class="social-icon">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" width="24" height="24">
        </span>
        เข้าสู่ระบบด้วยบัญชี Google
    </button>

    <a href="index.html" class="back-link">← กลับสู่หน้าหลัก</a>
</div>

<!-- Firebase SDK Implementation -->
<script type="module">
  import { auth, db } from "./firebase-config.js";
  import { signInWithRedirect, getRedirectResult, GoogleAuthProvider, fetchSignInMethodsForEmail, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

  // Handle Redirect Result after page reload
  if (auth) {
      checkRedirectResult();
  }

  // --- Handle Redirect Result (For Mobile Compatibility) ---
  async function checkRedirectResult() {
      if (!auth) return;
      try {
          const result = await getRedirectResult(auth);
          if (result) {
              console.log("[Auth] Google Redirect Detect: Processing user...");
              await saveUserToFirestore(result.user, 'google');
              
              // Force cart sync after login
              if (window.CartAPI && typeof window.CartAPI.forceSync === 'function') {
                  try {
                      console.log("[Auth] Google Syncing cart...");
                      await window.CartAPI.forceSync();
                  } catch (syncErr) {
                      console.error("[Auth] Cart sync minor error:", syncErr);
                  }
              }
              
              alert("เข้าสู่ระบบด้วย Google สำเร็จ! ยินดีต้อนรับ " + result.user.displayName);
              
              console.log("[Auth] Google Redirect: Finishing up...");
              await wait(500); // Small delay to ensure localStorage is flushed
              window.location.href = "index.html";
          }
      } catch (error) {
          console.error("[Auth] Redirect Error:", error);
          if (error.code !== 'auth/web-storage-unsupported') {
              alert("เกิดข้อผิดพลาดในการดึงข้อมูลเข้าระบบ: " + error.message);
          }
      }
  }

  // --- Save user data to Firestore ---
  async function saveUserToFirestore(user, provider) {
      console.log("[Auth] Saving user session...");
      // Save locally for UI updates across all pages
      const userData = {
          uid: user.uid,
          name: user.displayName || user.email.split('@')[0],
          email: user.email,
          photo: user.photoURL || ""
      };
      localStorage.setItem('paomobile_user', JSON.stringify(userData));

      if (!db) return;
      try {
          const userRef = doc(db, "users", user.uid);
          await setDoc(userRef, {
              ...userData,
              photoURL: userData.photo,
              provider: provider,
              lastLogin: new Date()
          }, { merge: true });
          console.log("[Auth] User data synced to cloud.");
      } catch (e) {
          console.error("[Auth] Error saving user data: ", e);
      }
  }

  // Helper for small delay
  const wait = (ms) => new Promise(res => setTimeout(res, ms));

  // --- Google Sign-in ---
  document.getElementById("btnGoogleLogin").addEventListener("click", () => {
    if(!auth){ alert("Firebase Auth not initialized"); return; }
    const provider = new GoogleAuthProvider();
    signInWithRedirect(auth, provider).catch((error) => {
      console.error(error);
      alert("Error starting login: " + error.message);
    });
  });

  // --- Email Flow ---
  let isPasswordPhase = false;
  document.getElementById("btnEmailLogin").addEventListener("click", async () => {
     if(!auth){ alert("Firebase Auth not initialized"); return; }
     const email = document.getElementById("emailInput").value;
     if(!email) { alert("กรุณากรอกอีเมล"); return; }
     
     if(!isPasswordPhase) {
         fetchSignInMethodsForEmail(auth, email).then((methods) => {
             document.getElementById("passwordGroup").style.display = "block";
             document.getElementById("btnEmailLogin").innerText = methods.length > 0 ? "เข้าสู่ระบบ" : "สมัครสมาชิก";
             isPasswordPhase = true;
         }).catch(err => {
             alert(err.message);
         });
     } else {
         const password = document.getElementById("passwordInput").value;
         if(!password) { alert("กรุณากรอกรหัสผ่าน"); return; }
         
         try {
             let cred;
             if(document.getElementById("btnEmailLogin").innerText === "เข้าสู่ระบบ") {
                 cred = await signInWithEmailAndPassword(auth, email, password);
                 alert("เข้าสู่ระบบสำเร็จ!");
             } else {
                 cred = await createUserWithEmailAndPassword(auth, email, password);
                 alert("สมัครสมาชิกสำเร็จ!");
             }
             
             await saveUserToFirestore(cred.user, 'password');
             
             // Sync cart before moving
             if (window.CartAPI && typeof window.CartAPI.forceSync === 'function') {
                 console.log("[Auth] Syncing cart before redirect...");
                 await window.CartAPI.forceSync();
             }
             
             console.log("[Auth] Finishing session setup...");
             await wait(500); // Small delay to ensure localStorage is flushed
             window.location.href = "index.html";
             
         } catch(err) {
             console.error("[Auth] Login error:", err);
             alert(err.code === 'auth/wrong-password' ? "อีเมลหรือรหัสผ่านไม่ถูกต้อง" : "เกิดข้อผิดพลาด: " + err.message);
         }
     }
  });
</script>
<script src="cart.js"></script>
</body>
</html>
