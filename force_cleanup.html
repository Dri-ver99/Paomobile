<!DOCTYPE html>
<html>
<head>
    <title>🚨 Super Force Cleanup 123</title>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; text-align: center; background: #fdf2f2; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        h2 { color: #d32f2f; }
        .steps { text-align: left; margin: 20px 0; padding: 20px; background: #fff5f5; border-radius: 12px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d32f2f; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔥 ระบบกำลังเร่งลบสินค้า "123"</h2>
        <div id="status">
            <div class="loader"></div>
            <p>กำลังเริ่มกระบวนการล้างแคชและ Cloud...</p>
        </div>
        <div class="steps" id="log"></div>
    </div>

    <script>
        function log(msg, color='black') {
            const p = document.createElement('p');
            p.style.color = color;
            p.style.margin = '5px 0';
            p.innerHTML = msg;
            document.getElementById('log').appendChild(p);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBAGDBKRUPTmp4RCMao2mnXfgfQmIp54to",
            authDomain: "paomobile-85e39.firebaseapp.com",
            projectId: "paomobile-85e39",
            storageBucket: "paomobile-85e39.firebasestorage.app",
            messagingSenderId: "844151679424",
            appId: "1:844151679424:web:0cfd6f491b79cd175ec025",
            measurementId: "G-BZYNZ9B9LQ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function superCleanup() {
            try {
                // 1. Clear LocalStorage immediately (Fixes the "Still Showing" issue)
                log("🕒 1. กำลังล้างแคชในบราวเซอร์ (LocalStorage)...");
                localStorage.clear();
                log("✅ ล้างแคชในเครื่องเรียบร้อย!", "green");

                // 2. Broad Search in Cloud
                log("🕒 2. กำลังค้นหาสินค้า '123' ในระบบ Cloud...");
                // Check multiple match possibilities (String price vs Number price)
                const snapshots = await Promise.all([
                    db.collection('products').where('name', '==', '123').get(),
                    db.collection('products').where('name', '==', 123).get()
                ]);

                let totalDeleted = 0;
                for (const snap of snapshots) {
                    for (const doc of snap.docs) {
                        await db.collection('products').doc(doc.id).delete();
                        totalDeleted++;
                        log(`🗑️ ลบ Document ID: ${doc.id} เรียบร้อย`, "orange");
                    }
                }

                if (totalDeleted === 0) {
                    log("💡 ไม่พบสินค้าค้างใน Cloud แล้ว (น่าจะลบไปแล้วแต่ติดแคช)", "blue");
                } else {
                    log(`✅ ลบสินค้าใน Cloud ออกถาวรแล้ว ${totalDeleted} ชิ้น`, "green");
                }

                document.getElementById('status').innerHTML = `
                    <h1 style="font-size: 50px; margin: 0;">✅</h1>
                    <h3 style="color:green">เสร็จสิ้นภารกิจ!</h3>
                    <p>ตอนนี้สินค้า "123" ถูกลบถาวรแล้วครับ<br><b>รบกวนเปิดหน้าเว็บร้านค้าใหม่อีกครั้งครับ</b></p>
                `;
            } catch (err) {
                log("❌ เกิดข้อผิดพลาด: " + err.message, "red");
                document.getElementById('status').innerText = "ล้มเหลว กรุณาลองใหม่อีกครั้ง";
            }
        }

        setTimeout(superCleanup, 1000);
    </script>
</body>
</html>
