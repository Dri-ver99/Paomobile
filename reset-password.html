<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รีเซ็ตรหัสผ่านใหม่ - Paomobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', 'Noto Sans Thai', sans-serif;
            background-color: #f7f7f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #111;
        }
        input, button, select, textarea { font-family: inherit; }
        .login-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: auto;
            margin: 0 auto 32px auto;
            border-radius: 8px;
            object-fit: contain;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 15px;
            color: #555;
            margin-bottom: 32px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #111;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #7fa9ee;
        }
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            display: flex;
            align-items: center;
        }
        .btn-continue {
            width: 100%;
            background: #cbd5e1;
            /* Default inactive */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: not-allowed;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-continue.active {
            background: #0052cc;
            cursor: pointer;
        }

        .btn-continue.active:hover {
            background: #003d99;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.2);
        }

        .error-message {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            display: none;
            text-align: left;
        }
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0052cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #successView {
            display: none;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #ecfdf5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div style="margin-top: 16px; font-weight: 500;">กำลังประมวลผล...</div>
</div>

<div class="login-card">
    <div id="resetView">
        <img src="logo.png" alt="Paomobile Logo" class="logo" onerror="this.onerror=null; this.src='https://placehold.co/80x80?text=Logo';">
        <h1>รีเซ็ตรหัสผ่านใหม่</h1>
        <p class="subtitle" id="userEmail">กำลังโหลดข้อมูล...</p>

        <div class="input-group">
            <label>รหัสผ่านใหม่</label>
            <div class="password-wrapper">
                <input type="password" id="newPassword" placeholder="ระบุรหัสผ่านใหม่ (อย่างน้อย 8 ตัวอักษร)">
                <span class="toggle-password" data-target="newPassword">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <div id="passHint" class="error-message">รหัสผ่านต้องมี A-Z, a-z, 0-9 และอย่างน้อย 8 ตัว</div>
        </div>

        <div class="input-group">
            <label>ยืนยันรหัสผ่านใหม่</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="ระบุยืนยันรหัสผ่านใหม่อีกครั้ง">
                <span class="toggle-password" data-target="confirmPassword">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <div id="matchError" class="error-message">รหัสผ่านไม่ตรงกัน</div>
        </div>

        <button class="btn-continue" id="btnSavePassword" disabled>บันทึกรหัสผ่านใหม่</button>
    </div>

    <div id="successView">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>บันทึกเรียบร้อย</h1>
        <p class="subtitle">รหัสผ่านของคุณถูกเปลี่ยนเรียบร้อยแล้วครับ</p>
        <button class="btn-continue active" onclick="window.location.href='login.html'">กลับไปหน้าเข้าสู่ระบบ</button>
    </div>

    <div id="errorView" style="display: none;">
        <h1 style="color: #ef4444;">เกิดข้อผิดพลาด</h1>
        <p class="subtitle" id="errorMessage">ลิงก์นี้หมดอายุหรือถูกใช้งานไปแล้ว</p>
        <button class="btn-continue active" onclick="window.location.href='login.html'">ขอยืนยันเพื่อขอรีเซ็ตรหัสผ่านใหม่</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset, checkActionCode } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAGDBKRUPTmp4RCMao2mnXfgfQmIp54to", // Same as login.html
        authDomain: "paomobile-85e39.firebaseapp.com",
        projectId: "paomobile-85e39",
        storageBucket: "paomobile-85e39.firebasestorage.app",
        messagingSenderId: "844151679424",
        appId: "1:844151679424:web:0cfd6f491b79cd175ec025"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Get URL Params
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const actionCode = urlParams.get('oobCode');

    const loading = document.getElementById('loadingOverlay');
    const resetView = document.getElementById('resetView');
    const successView = document.getElementById('successView');
    const errorView = document.getElementById('errorView');
    const emailDisplay = document.getElementById('userEmail');

    // Security: Only allow resetPassword mode
    if (mode !== 'resetPassword' || !actionCode) {
        showError("ลิงก์ไม่ถูกต้อง กรุณาตรวจสอบลิงก์ใหม่อีกครั้ง");
    } else {
        verifyCode();
    }

    async function verifyCode() {
        loading.style.display = 'flex';
        try {
            const email = await verifyPasswordResetCode(auth, actionCode);
            emailDisplay.textContent = `สำหรับบัญชี: ${email}`;
            loading.style.display = 'none';
        } catch (error) {
            console.error("Link Verification Failed:", error);
            showError("ลิงก์นี้หมดอายุหรือถูกใช้งานไปแล้วครับ");
        }
    }

    function showError(msg) {
        loading.style.display = 'none';
        resetView.style.display = 'none';
        errorView.style.display = 'block';
        document.getElementById('errorMessage').textContent = msg;
    }

    // --- Validation Logic ---
    const newPass = document.getElementById('newPassword');
    const confirmPass = document.getElementById('confirmPassword');
    const btnSave = document.getElementById('btnSavePassword');
    const passHint = document.getElementById('passHint');
    const matchError = document.getElementById('matchError');

    function validate() {
        const val = newPass.value;
        const confVal = confirmPass.value;

        const hasUpper = /[A-Z]/.test(val);
        const hasLower = /[a-z]/.test(val);
        const hasNumber = /[0-9]/.test(val);
        const isLong = val.length >= 8;
        const isValid = hasUpper && hasLower && hasNumber && isLong;

        const isMatch = val === confVal && confVal !== "";

        passHint.style.display = (val.length > 0 && !isValid) ? "block" : "none";
        matchError.style.display = (confVal.length > 0 && !isMatch) ? "block" : "none";

        if (isValid && isMatch) {
            btnSave.classList.add('active');
            btnSave.disabled = false;
        } else {
            btnSave.classList.remove('active');
            btnSave.disabled = true;
        }
    }

    newPass.addEventListener('input', validate);
    confirmPass.addEventListener('input', validate);

    // Save Logic
    btnSave.addEventListener('click', async () => {
        const pass = newPass.value;
        loading.style.display = 'flex';
        try {
            await confirmPasswordReset(auth, actionCode, pass);
            loading.style.display = 'none';
            resetView.style.display = 'none';
            successView.style.display = 'block';
        } catch (error) {
            loading.style.display = 'none';
            alert("เกิดข้อผิดพลาดในการบันทึก: " + error.message);
        }
    });

    // Toggle Visibility
    document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.addEventListener('click', () => {
            const target = document.getElementById(btn.getAttribute('data-target'));
            if (target.type === 'password') {
                target.type = 'text';
                btn.style.color = '#7fa9ee';
            } else {
                target.type = 'password';
                btn.style.color = '#94a3b8';
            }
        });
    });
</script>

</body>
</html>
