<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยืนยันอีเมลสำเร็จ — Paomobile</title>
    <meta name="description" content="ยืนยันอีเมลสำเร็จ! ยินดีต้อนรับสู่ Paomobile ร้านโทรศัพท์มือถือครบวงจร">
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Confetti burst */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall linear forwards;
            opacity: 0;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Main card */
        .confirm-card {
            position: relative;
            z-index: 5;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: scale(0.8) translateY(30px);
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Status indicator */
        .status-container {
            margin-bottom: 28px;
        }

        .status-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }

        /* Success checkmark animation */
        .checkmark-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
            opacity: 0;
            transform: scale(0);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.3);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        .checkmark-circle svg {
            width: 50px;
            height: 50px;
            stroke: white;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .checkmark-path {
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
            animation: drawCheck 0.5s ease-out 0.8s forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* Pulse ring */
        .checkmark-circle::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(0, 210, 255, 0.4);
            animation: pulseRing 2s ease-out 1s infinite;
        }

        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* Error state */
        .error-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
            opacity: 0;
            transform: scale(0);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.3);
        }

        .error-circle svg {
            width: 45px;
            height: 45px;
            stroke: white;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
        }

        /* Loading state */
        .loading-spinner {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d2ff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Logo */
        .logo-section {
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease-out 0.5s forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-img {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .brand-name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .brand-name .accent {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-tagline {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 300;
            margin-top: 4px;
        }

        /* Content */
        .confirm-title {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
            animation: fadeInUp 0.6s ease-out 0.7s forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        .confirm-message {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease-out 0.9s forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        .confirm-message strong {
            color: #00d2ff;
        }

        /* CTA Button */
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            font-family: 'Prompt', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.3);
            animation: fadeInUp 0.6s ease-out 1.1s forwards;
            opacity: 0;
            transform: translateY(15px);
            border: none;
            cursor: pointer;
        }

        .btn-home:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 8px 30px rgba(0, 210, 255, 0.5);
        }

        .btn-home:active {
            transform: translateY(0) !important;
        }

        .btn-retry {
            background: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
        }

        .btn-retry:hover {
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.5);
        }

        /* Timer redirect */
        .redirect-timer {
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
            margin-top: 20px;
            animation: fadeInUp 0.6s ease-out 1.3s forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        .redirect-timer span {
            color: #00d2ff;
            font-weight: 600;
        }

        /* Footer */
        .footer-text {
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            margin-top: 28px;
            animation: fadeInUp 0.6s ease-out 1.5s forwards;
            opacity: 0;
        }

        /* Hidden states */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Animated particles background -->
    <div class="particles" id="particles"></div>

    <!-- Confetti (success only) -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- Main Card -->
    <div class="confirm-card">
        <!-- Logo -->
        <div class="logo-section">
            <img src="logo.png" alt="Paomobile" class="logo-img">
            <div class="brand-name">Pao<span class="accent">mobile</span></div>
            <div class="brand-tagline">ซื้อ ขาย ซ่อม ฝากจำนำ — ครบจบในที่เดียว</div>
        </div>

        <!-- Status Icon -->
        <div class="status-container">
            <!-- Loading State -->
            <div class="status-icon" id="loadingState">
                <div class="loading-spinner"></div>
            </div>

            <!-- Success State -->
            <div class="status-icon hidden" id="successState">
                <div class="checkmark-circle">
                    <svg viewBox="0 0 50 50">
                        <path class="checkmark-path" d="M14 27 L22 35 L38 16"/>
                    </svg>
                </div>
            </div>

            <!-- Error State -->
            <div class="status-icon hidden" id="errorState">
                <div class="error-circle">
                    <svg viewBox="0 0 50 50">
                        <line x1="16" y1="16" x2="34" y2="34"/>
                        <line x1="34" y1="16" x2="16" y2="34"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Content -->
        <h1 class="confirm-title" id="confirmTitle">กำลังยืนยันอีเมล...</h1>
        <p class="confirm-message" id="confirmMessage">
            กรุณารอสักครู่ ระบบกำลังตรวจสอบข้อมูลของคุณ ✨
        </p>

        <!-- CTA -->
        <div id="ctaSection" class="hidden">
            <a href="index.html" class="btn-home" id="ctaButton">
                🛍️ เริ่มช้อปปิ้งเลย!
            </a>
        </div>

        <!-- Timer -->
        <div class="redirect-timer hidden" id="redirectTimer">
            ระบบจะพาคุณไปหน้าหลักใน <span id="countdown">5</span> วินาที...
        </div>

        <!-- Footer -->
        <div class="footer-text">
            © 2026 Paomobile — ร้านโทรศัพท์มือถือครบวงจร
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ivnayulkvlxjnwfwjxmj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ZZPe_GiGq-5W780KOI64yg_zzsjWvq7';

        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#00d2ff', '#3a7bd5', '#764ba2', '#667eea', '#f97316'];

            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${Math.random() * 100}%;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    animation-duration: ${Math.random() * 8 + 6}s;
                    animation-delay: ${Math.random() * 5}s;
                `;
                container.appendChild(particle);
            }
        }

        // Create confetti burst
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bd6', '#00d2ff'];
            const shapes = ['square', 'circle'];

            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                const color = colors[Math.floor(Math.random() * colors.length)];
                const size = Math.random() * 8 + 5;
                const isCircle = shapes[Math.floor(Math.random() * shapes.length)] === 'circle';

                confetti.style.cssText = `
                    left: ${Math.random() * 100}%;
                    width: ${size}px;
                    height: ${isCircle ? size : size * 2}px;
                    background: ${color};
                    border-radius: ${isCircle ? '50%' : '2px'};
                    animation-duration: ${Math.random() * 2 + 2}s;
                    animation-delay: ${Math.random() * 0.5}s;
                `;
                container.appendChild(confetti);
            }
        }

        // Show success state
        function showSuccess(email) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('successState').classList.remove('hidden');

            document.getElementById('confirmTitle').textContent = '🎉 ยืนยันอีเมลสำเร็จ!';
            document.getElementById('confirmMessage').innerHTML = 
                `ยินดีต้อนรับสู่ <strong>Paomobile</strong> ครับ!<br>` +
                (email ? `อีเมล <strong>${email}</strong> ได้รับการยืนยันเรียบร้อยแล้ว<br>` : '') +
                `คุณสามารถเริ่มช้อปปิ้งสินค้าได้ทันที 🛍️`;

            document.getElementById('ctaSection').classList.remove('hidden');
            document.getElementById('redirectTimer').classList.remove('hidden');

            createConfetti();
            startCountdown();
        }

        // Show error state
        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');

            document.getElementById('confirmTitle').textContent = '❌ เกิดข้อผิดพลาด';
            document.getElementById('confirmMessage').innerHTML = 
                message || 'ไม่สามารถยืนยันอีเมลได้ กรุณาลองใหม่อีกครั้งครับ';

            const ctaSection = document.getElementById('ctaSection');
            ctaSection.classList.remove('hidden');
            const btn = document.getElementById('ctaButton');
            btn.href = 'login.html';
            btn.className = 'btn-home btn-retry';
            btn.innerHTML = '🔄 กลับไปหน้าเข้าสู่ระบบ';
        }

        // Auto redirect countdown
        function startCountdown() {
            let seconds = 5;
            const countdownEl = document.getElementById('countdown');
            const timer = setInterval(() => {
                seconds--;
                countdownEl.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(timer);
                    window.location.replace('index.html');
                }
            }, 1000);
        }

        // Initialize
        createParticles();

        // Check for Supabase auth callback
        (async () => {
            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // Get the hash fragment from URL
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const queryParams = new URLSearchParams(window.location.search);

                // Check if this is a token confirmation
                const tokenHash = queryParams.get('token_hash') || hashParams.get('token_hash');
                const type = queryParams.get('type') || hashParams.get('type');

                if (tokenHash && type) {
                    // Verify OTP token
                    const { data, error } = await supabase.auth.verifyOtp({
                        token_hash: tokenHash,
                        type: type
                    });

                    if (error) throw error;

                    const email = data?.user?.email || '';
                    showSuccess(email);
                } else {
                    // Try to get session from URL (e.g., after OAuth or email confirm redirect)
                    const { data: { session }, error } = await supabase.auth.getSession();
                    
                    if (session) {
                        showSuccess(session.user.email);
                    } else {
                        // No session, no token - maybe direct visit
                        showSuccess('');
                    }
                }
            } catch (err) {
                console.error('[Confirm] Error:', err);
                showError('ลิงก์ยืนยันอีเมลไม่ถูกต้องหรือหมดอายุแล้วครับ<br>กรุณาลองสมัครใหม่อีกครั้ง 🙏');
            }
        })();
    </script>
</body>
</html>
