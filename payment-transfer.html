  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Thai', 'Outfit', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;

    }

    /* ─── Top Bar ─── */

    /* ─── Main container ─── */

    .card {

    /* ─── Amount row ─── */

    /* ─── Bank Details Section ─── */
    .bank-card {

    }

      width: 56px;

      align-items: center;

    /* ─── Upload Section ─── */
    .upload-card {

    .upload-box {

    input[type="file"] {

    .preview-container {

    /* ─── Action Button ─── */
    .btn-verify {
      display: inline-flex;

      color: #fff;

      border-radius: 12px;
      padding: 16px 28px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;

      transition: all .2s;

    }
    .btn-verify:disabled {
      background: #ccc;
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-verify:not(:disabled):active { transform: scale(0.98); }

    /* ─── AI Verification Status ─── */
    .verify-status-box {
      display: none;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      margin-top: 20px;
      background: #f8f9fc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;

    .verify-step {
      display: flex;

    }
    .verify-step.active {
      color: #3b82f6;
      font-weight: 600;
    }
    .verify-step.success {
      color: #10b981;
    }
    .verify-step.error {
      color: #ef4444;
    }
    .step-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      border: 2px solid rgba(59,130,246,0.2);
      border-left-color: #3b82f6;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

  </style>
</head>

  <script>
    // ─── Utility ───
    function copyText(elementId) {
      const el = document.getElementById(elementId);
      navigator.clipboard.writeText(el.textContent).then(() => {
        alert("คัดลอก " + el.textContent + " แล้ว");
      });
    }

    // ─── Read URL params ───
    const params = new URLSearchParams(location.search);
    const amount = parseFloat(params.get('amount') || '0');
    const ref = params.get('ref') || '';
    
    // ─── Display amount ───
    const fmt = '฿' + amount.toLocaleString('th-TH', {minimumFractionDigits: 0});
    document.getElementById('displayAmount').textContent = fmt;

    // ─── Dynamic Bank Info (v1.2.12) ───
    const selectedBankValue = params.get('bank') || 'scb';
    function updateBankInfo() {
      const bankLogos = {
        'scb': 'https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://www.scb.co.th&size=64',
        'kbank': 'https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://www.kasikornbank.com&size=64'
      };
      const bankNames = {
        'scb': 'ไทยพาณิชย์ (Siam Commercial Bank)',
        'kbank': 'กสิกรไทย (Kasikornbank)'
      };
      const bankNums = {
        'scb': '407-866794-5',
        'kbank': 'XXX-XXXXXX-X'
      };
      const bankAccNames = {
        'scb': 'เขมรัฐ นาคภักดี',
        'kbank': 'เขมรัฐ นาคภักดี'
      };

      if (document.getElementById('bankLogoImg')) document.getElementById('bankLogoImg').src = bankLogos[selectedBankValue];
      if (document.getElementById('bankNameText')) document.getElementById('bankNameText').textContent = bankNames[selectedBankValue];
      if (document.getElementById('accNum')) document.getElementById('accNum').textContent = bankNums[selectedBankValue];
      if (document.getElementById('accName')) document.getElementById('accName').textContent = bankAccNames[selectedBankValue];
    }
    updateBankInfo();

    // ─── Expire Calculation ───
    const getActiveUserId = () => { try { const u = JSON.parse(localStorage.getItem('paomobile_user')); return u ? (u.uid || u.phone || 'default') : 'guest'; } catch { return 'guest'; } };
    const userOrdersKey = 'pao_orders_' + getActiveUserId();
    const rawUser = localStorage.getItem(userOrdersKey) || '[]';
    let userOrders = [];
    try { userOrders = JSON.parse(rawUser); } catch(e){}
    
    let currentOrder = userOrders.find(o => o.id === ref);
    let orderTime = Date.now();
    if (currentOrder && currentOrder.orderDate) {
        orderTime = new Date(currentOrder.orderDate).getTime();
    }
    
    const expireDate = new Date(orderTime + 30 * 60 * 1000);
    const dd = ('0'+expireDate.getDate()).slice(-2);
    const mm = ('0'+(expireDate.getMonth()+1)).slice(-2);
    const yy = expireDate.getFullYear() + 543;
    const hh = ('0'+expireDate.getHours()).slice(-2);
    const mi = ('0'+expireDate.getMinutes()).slice(-2);
    document.getElementById('expireText').textContent = `หมดอายุ ${dd}/${mm}/${yy} ${hh}:${mi}`;

    // ─── Countdown Timer ───
    const timerEl = document.getElementById('countdownTimer');
    
    function cancelOrderDueToTimeout() {
        if (currentOrder && currentOrder.status === 'ที่ต้องชำระ') {
            currentOrder.status = 'ยกเลิกแล้ว';
            localStorage.setItem(userOrdersKey, JSON.stringify(userOrders));
            try {
                const rawGlobal = localStorage.getItem('pao_global_orders') || '[]';
                let globalOrders = JSON.parse(rawGlobal);
                let gOrder = globalOrders.find(o => o.id === ref);
                if (gOrder) {
                    gOrder.status = 'ยกเลิกแล้ว';
                    localStorage.setItem('pao_global_orders', JSON.stringify(globalOrders));
                }
            } catch(e){}
        }
        timerEl.textContent = 'หมดเวลาชำระเงิน';
        timerEl.style.color = '#757575';
        timerEl.style.fontSize = '1rem';
        document.getElementById('btnVerify').disabled = true;
    }

    function updateTick() {
        let remaining = Math.floor((expireDate.getTime() - Date.now()) / 1000);
        if (remaining <= 0) { 
            cancelOrderDueToTimeout();
            return false; 
        }
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        timerEl.textContent = `${m} : ${s}`;
        if (remaining <= 300) timerEl.style.color = '#c0392b';
        return true;
    }
    if (updateTick()) {
        const tick = setInterval(() => { if (!updateTick()) clearInterval(tick); }, 1000);
    }

    // ─── Slip Upload & Verification Variables ───
    let currentFile = null;

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      currentFile = file;

      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('uploadBox').style.display = 'none';
        document.getElementById('previewContainer').style.display = 'flex';
        document.getElementById('slipPreview').src = e.target.result;
        document.getElementById('btnVerify').disabled = false;
        
        // Reset status box
        document.getElementById('verifyStatusBox').style.display = 'none';
        resetSteps();
      }
      reader.readAsDataURL(file);
    }

    function resetSteps() {
      ['time', 'qr', 'bank', 'ocr', 'amount'].forEach(id => {
        const el = document.getElementById('step-' + id);
        const icon = document.getElementById('icon-' + id);
        if (el) el.className = 'verify-step';
        if (icon) {
          icon.innerHTML = '○';
          icon.style.color = '#64748b';
        }
      });
    }

    function setStepStatus(id, status) {
      const el = document.getElementById('step-' + id);
      const icon = document.getElementById('icon-' + id);
      el.className = 'verify-step ' + status;
      if (status === 'active') {
        icon.innerHTML = '<div class="spinner"></div>';
        icon.style.color = '#3b82f6';
      } else if (status === 'success') {
        icon.innerHTML = '✓';
        icon.style.color = '#10b981';
      } else if (status === 'error') {
        icon.innerHTML = '✗';
        icon.style.color = '#ef4444';
      }
    }

    async function startVerification() {
        const btn = document.getElementById('btnVerify');
        btn.disabled = true;
        btn.textContent = "AI กำลังตรวจสอบ...";
        document.getElementById('verifyStatusBox').style.display = 'block';
        resetSteps();

        // 1. Time Check (45 min grace period)
        setStepStatus('time', 'active');
        await sleep(600);
        const slipTime = currentFile.lastModified;
        const diffMinutes = (Date.now() - slipTime) / (1000 * 60);
        if (diffMinutes > 45) {
            setStepStatus('time', 'error');
            alert('❌ ไม่ผ่าน: สลิปนี้เก่าเกินไป (เกิน 45 นาที) กรุณาใช้สลิปปัจจุบันที่คุณเพิ่งโอนสำเร็จ');
            btn.disabled = false;
            btn.textContent = "ลองอัปโหลดสลิปใหม่";
            return;
        }
        setStepStatus('time', 'success');

        // 2. QR Code
        setStepStatus('qr', 'active');
        const hasQR = await scanQR(document.getElementById('slipPreview'));
        await sleep(500);
        if (!hasQR) {
            setStepStatus('qr', 'error');
            alert("❌ ไม่ผ่าน: ไม่พบ QR Code ของธนาคารบนสลิป กรุณาอัปโหลดสลิปธนาคารของแท้ที่มี QR Code");
            btn.disabled = false;
            btn.textContent = "เปลี่ยนรูปสลิป";
            return;
        }
        setStepStatus('qr', 'success');

        // 3. OCR (Detailed Multi-Fact Verification)
        setStepStatus('bank', 'active');
        setStepStatus('ocr', 'active');
        setStepStatus('amount', 'active');
        try {
            const recognizedText = await runOCR(currentFile);
            const cleanText = recognizedText.toLowerCase().replace(/\s+/g, '');
            console.log("OCR Result Text:", cleanText);

            // --- Fact 1: Recipient Name (เขมรัฐ นาคภักดี) ---
            const nameMatch = cleanText.includes('เขมรัฐ') || cleanText.includes('khemarat') || cleanText.includes('นาคภักดี') || cleanText.includes('nakphakdee');
            
            // --- Fact 2: Date (Buddhist Era 2569) ---
            const now = new Date();
            const day = now.getDate().toString().padStart(2, '0');
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const yearBE = (now.getFullYear() + 543).toString();
            const yearBEshort = yearBE.slice(-2);
            const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const thaiMonth = thaiMonths[now.getMonth()];
            
            const datePatterns = [
                `${day}/${month}/${yearBE}`,
                `${day}/${month}/${yearBEshort}`,
                day + month + yearBEshort,
                day + thaiMonth + yearBEshort,
                day + thaiMonth + yearBE
            ];
            const dateMatch = datePatterns.some(p => cleanText.includes(p.replace(/\s+/g, '').toLowerCase())) || cleanText.includes(day);

            // --- Fact 2.5: Time Check (Before Expiration) ---
            // The user's order expires 30 minutes after orderDate
            const expTime = new Date(new Date(orderDate).getTime() + 30 * 60 * 1000);
            const slipTimeMatch = recognizedText.match(/([01]\d|2[0-3])[:.]([0-5]\d)/);
            let timeValid = true;
            if (slipTimeMatch) {
                const [_, hour, minute] = slipTimeMatch;
                const slipDateObj = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(hour), parseInt(minute));
                // Add a small buffer (5 min) in case clocks are slightly off
                if (slipDateObj.getTime() > expTime.getTime() + 5 * 60 * 1000) {
                    timeValid = false;
                }
            }

            // Results Processing
            if (!nameMatch) {
                setStepStatus('ocr', 'error');
                alert('❌ ไม่ผ่าน: AI ตรวจไม่พบชื่อผู้รับ "เขมรัฐ นาคภักดี" บนสลิป');
                btn.disabled = false; return;
            }
            if (!dateMatch) {
                setStepStatus('ocr', 'error');
                alert(`❌ ไม่ผ่าน: วันที่บนสลิปไม่ตรงกับออเดอร์ (${day}/${month}/${yearBE})`);
                btn.disabled = false; return;
            }
            if (!timeValid) {
                setStepStatus('time', 'error');
                alert(`❌ ไม่ผ่าน: โอนเกินเวลาที่กำหนด (หมดอายุเมื่อ ${expTime.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})})`);
                btn.disabled = false; return;
            }

            // --- Fact 3: Amount (Exact match) ---
            const targetAmountStr = amount.toLocaleString('th-TH', {minimumFractionDigits: 2});
            const targetAmountSimple = amount.toString();
            const amountMatch = cleanText.includes(targetAmountStr.replace(',', '')) || 
                                cleanText.includes(targetAmountStr.replace('.', '')) || 
                                cleanText.includes(targetAmountSimple);

            // --- Fact 4: Bank Name (SCB/KBank) ---
            const selectedBank = params.get('bank') || 'scb';
            let bankMatch = false;
            if (selectedBank === 'scb') {
                bankMatch = cleanText.includes('scb') || cleanText.includes('ไทยพาณิชย์') || cleanText.includes('siamcommercial');
            } else if (selectedBank === 'kbank') {
                bankMatch = cleanText.includes('kbank') || cleanText.includes('กสิกร') || cleanText.includes('kasikorn');
            }

            if (bankMatch) {
                setStepStatus('bank', 'success');
            } else {
                setStepStatus('bank', 'error');
                alert(`❌ ไม่ผ่าน: สลิปนี้ไม่ใช่ธนาคาร ${selectedBank.toUpperCase()} ที่คุณเลือกไว้ตอนสั่งซื้อ`);
                btn.disabled = false; return;
            }
            setStepStatus('ocr', 'success');

            if (amountMatch) {
                setStepStatus('amount', 'success');
            } else {
                setStepStatus('amount', 'error');
                alert(`❌ ไม่ผ่าน: ยอดเงินบนสลิปไม่ตรงกับยอด ฿${amount.toLocaleString()} กรุณาตรวจสอบการพิมพ์ยอดโอนให้ถูกต้อง`);
                btn.disabled = false;
                btn.textContent = "เปลี่ยนรูปสลิป";
                return;
            }

            await finalizePayment();
        } catch (e) {
            console.error("OCR Error", e);
            alert('❌ ระบบ AI ขัดข้องชั่วคราว กรุณาลองใหม่อีกครั้ง');
            btn.disabled = false;
        }
    }

    async function scanQR(imgEl) {
        return new Promise((resolve) => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            // Scale down for faster scan
            const maxDimension = 1200;
            let ratio = 1;
            if (imgEl.naturalWidth > imgEl.naturalHeight) {
                if (imgEl.naturalWidth > maxDimension) ratio = maxDimension / imgEl.naturalWidth;
            } else {
                if (imgEl.naturalHeight > maxDimension) ratio = maxDimension / imgEl.naturalHeight;
            }
            canvas.width = imgEl.naturalWidth * ratio;
            canvas.height = imgEl.naturalHeight * ratio;
            
            ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
            });
            if (code && code.data) {
                resolve(true);
            } else {
                resolve(false);
            }
        });
    }

    async function runOCR(file) {
        // Use both Thai and English for best accuracy on numbers/names
        const worker = await Tesseract.createWorker('tha+eng');
        const url = URL.createObjectURL(file);
        const ret = await worker.recognize(url);
        await worker.terminate();
        URL.revokeObjectURL(url);
        return ret.data.text;
    }

    function sleep(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    async function finalizePayment() {
        const btn = document.getElementById('btnVerify');
        btn.style.background = '#10b981'; // green
        btn.innerHTML = 'ตรวจสอบสลิปสำเร็จ!';
        
        const globalOrdersKey = 'pao_global_orders';
        let updated = false;

        try {
            // --- Sync with Firestore & Storage (v1.2.11) ---
            const db = window.firestoreDB;
            const storage = window.firebaseStorage;
            let slipUrl = "";

            if (db && storage && currentFile) {
                console.log("[v1.2.11] Syncing to Firestore...");
                const orderId = ref;
                const storageRef = ref(storage, `slips/${orderId}_${Date.now()}.png`);
                
                try {
                    const uploadResult = await uploadBytes(storageRef, currentFile);
                    slipUrl = await getDownloadURL(uploadResult.ref);
                    console.log("[v1.2.11] Slip uploaded:", slipUrl);
                    
                    const orderRef = doc(db, "orders", orderId);
                    await updateDoc(orderRef, {
                        status: 'ที่ต้องจัดส่ง',
                        paymentSlip: slipUrl,
                        paymentDate: new Date()
                    });
                    console.log("[v1.2.11] Firestore updated successfully");
                    updated = true;
                } catch (fsErr) {
                    console.error("[v1.2.11] Cloud sync failed:", fsErr);
                    // Continue to local sync as fallback
                }
            }

            // --- Local Storage Fallback ---
            const rawUser = localStorage.getItem(userOrdersKey) || '[]';
            let uOrders = JSON.parse(rawUser);
            let targetOrderId = ref;
            
            for (let i = 0; i < uOrders.length; i++) {
                if (uOrders[i].id === targetOrderId || (uOrders[i].status === 'ที่ต้องชำระ' && uOrders[i].total === amount)) {
                    uOrders[i].status = 'ที่ต้องจัดส่ง';
                    uOrders[i].paymentMethod = 'โอนเงินผ่านธนาคาร';
                    uOrders[i].paymentBank = 'SCB';
                    if (slipUrl) uOrders[i].paymentSlip = slipUrl;
                    
                    targetOrderId = uOrders[i].id;
                    updated = true;
                    break;
                }
            }
            
            if (updated) {
                localStorage.setItem(userOrdersKey, JSON.stringify(uOrders));
                
                const rawGlobal = localStorage.getItem(globalOrdersKey) || '[]';
                let gOrders = JSON.parse(rawGlobal);
                for (let i = 0; i < gOrders.length; i++) {
                    if (gOrders[i].id === targetOrderId) {
                        gOrders[i].status = 'ที่ต้องจัดส่ง';
                        gOrders[i].paymentMethod = 'โอนเงินผ่านธนาคาร';
                        gOrders[i].paymentBank = 'SCB';
                        if (slipUrl) gOrders[i].paymentSlip = slipUrl;
                        localStorage.setItem(globalOrdersKey, JSON.stringify(gOrders));
                        break;
                    }
                }
            }
        } catch (e) { console.error(e); }

        setTimeout(() => {
            alert('✅ AI ยืนยันสลิปสำเร็จ! สถานะคำสั่งซื้อของคุณได้อัพเดทเป็น "ที่ต้องจัดส่ง"');
            window.location.href = 'purchases.html';
        }, 1200);
    }
  </script>
