<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5760 120" preserveAspectRatio="none" style="width: 100%; height: 100%;">
  <defs>
    <style>
      .wave1 { animation: wave 25s linear infinite; }
      .wave2 { animation: wave 35s linear infinite; }
      .wave3 { animation: wave 45s linear infinite; }
      @keyframes wave {
        0% { transform: translateX(0); }
        100% { transform: translateX(-2880px); }
      }
    </style>
  </defs>
  
  <!-- Wave 3 (Back) -->
  <g class="wave3" fill="#1C1710" opacity="0.4">
    <path d="M0,40 C960,100 1920,-20 2880,40 C3840,100 4800,-20 5760,40 C6720,100 7680,-20 8640,40 L8640,120 L0,120 Z"></path>
  </g>

  <!-- Wave 2 (Middle) -->
  <g class="wave2" fill="#1C1710" opacity="0.7">
    <path d="M0,60 C960,0 1920,120 2880,60 C3840,0 4800,120 5760,60 C6720,0 7680,120 8640,60 L8640,120 L0,120 Z"></path>
  </g>

  <!-- Wave 1 (Front - Solid to blend with footer) -->
  <g class="wave1" fill="#1C1710" opacity="1">
    <path d="M0,70 C960,120 1920,20 2880,70 C3840,120 4800,20 5760,70 C6720,120 7680,20 8640,70 L8640,120 L0,120 Z"></path>
  </g>
</svg>
